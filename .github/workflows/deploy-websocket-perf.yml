name: Deploy WebSocket Server (PERF)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web-socket/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (PERF)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PERF_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/chess-websocket/chess-battle-turbo
            echo "Pulling latest..."
            git pull origin main

            cd apps/web-socket
            echo "Installing deps..."
            pnpm install

            echo "Building..."
            pnpm run build

            if [ ! -f "dist/index.js" ]; then
              echo "ERROR: Build failed - dist/index.js not found"
              exit 1
            fi

            echo "Restarting service..."
            sudo systemctl restart chess-websocket
            sleep 2

            if sudo systemctl is-active --quiet chess-websocket; then
              echo "Service is running"
              curl -s http://localhost:3002/health
              echo ""
            else
              echo "ERROR: Service failed to start"
              sudo journalctl -u chess-websocket -n 20 --no-pager
              exit 1
            fi

            echo "PERF deployment complete!"
